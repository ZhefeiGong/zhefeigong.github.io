# # ====================== Main author ======================
Zhefei: # author1:
  name:                Zhefei Gong # <firstname> <lastname>
  email:               zhefeigong@gmail.com # <mail@domain.tld>
  
  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    Hi, I'm an incoming PhD student at [Khoury College of Computer Science](https://www.khoury.northeastern.edu/) at [Northeastern University](https://www.northeastern.edu/), advised by Prof. [Robert Platt](https://www.khoury.northeastern.edu/people/robert-platt/). 
    Previously, I have worked with Prof. [Jiachen Li](https://jiachenli94.github.io/) and Prof. [Donglin Wang](https://milab.westlake.edu.cn/).
    I earned my BEng in Computer Science from [Tongji University](https://www.tongji.edu.cn/), including a memorable semester as an exchange student at [EPFL](https://www.epfl.ch/en/). 
    During my time at Tongji, I also had the opportunity to engage with the [IRCP Lab](https://robot.tongji.edu.cn/) and gain early research experience.

    After an extensive period of exploration, my interest has gravitated towards solving [real-world](https://zhefeigong.github.io/experience/#robotic-platforms) tasks.
    I am currently interested in **robot learning**, **generative models** and **reinforcement learning**, particularly for **manipulation** tasks.
    My long-term goal is to _enable general-purpose robots to learn autonomously in dynamic, unstructured environments_, bridging the gap from lab demonstrations to everyday human settings. 
    I aspire to develop robots capable of performing complex, long-term daily tasks independently, and I am dedicated to advancing this vision over the next decade.
    Feel free to get in touch if our research interests align.

